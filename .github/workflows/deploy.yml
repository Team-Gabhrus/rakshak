name: Deploy Rakshak to EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Docker
        run: |
          # 1. Build the fresh image
          docker build -t rakshak-app .

          # 2. Stop and remove the old container (if exists)
          docker stop rakshak || true
          docker rm rakshak || true

          # 3. Launch the fresh container (injecting secrets directly)
          # Note: We pass secrets via -e so we no longer depend on a local host .env file
          docker run -d \
            --name rakshak \
            --restart unless-stopped \
            -p 80:8000 \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v /home/ubuntu/psb-cyber-26/rakshak:/data \
            -e SMTP_HOST="${{ secrets.SMTP_HOST }}" \
            -e SMTP_PORT="${{ secrets.SMTP_PORT }}" \
            -e SMTP_USER="${{ secrets.SMTP_USER }}" \
            -e SMTP_PASSWORD="${{ secrets.SMTP_PASSWORD }}" \
            -e SLACK_WEBHOOK_URL="${{ secrets.SLACK_WEBHOOK_URL }}" \
            -e SECRET_KEY="${{ secrets.SECRET_KEY }}" \
            -e GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            -e ALGORITHM="${{ secrets.ALGORITHM }}" \
            -e ACCESS_TOKEN_EXPIRE_MINUTES="${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}" \
            -e APP_BASE_URL="${{ secrets.APP_BASE_URL }}" \
            -e DATABASE_URL="sqlite+aiosqlite:////data/rakshak.db" \
            rakshak-app
