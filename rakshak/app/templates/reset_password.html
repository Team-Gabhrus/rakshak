<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset Password — Rakshak</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="rk-bg-dark" style="height: 100vh; display: flex; align-items: center; justify-content: center;">
  <div class="rk-card login-card" style="width: 100%; max-width: 400px; padding: 40px;">
    <div class="text-center mb-4">
      <h2 style="color: var(--rk-text); font-weight: 700;">Rakshak</h2>
      <p style="color: var(--rk-text-muted);">Reset Your Password</p>
    </div>
    
    <div id="resetForm">
      <div class="mb-3">
        <label class="rk-form-label">New Password</label>
        <input type="password" id="newPassword" class="rk-form-control" placeholder="Enter new password">
      </div>
      <div class="mb-4">
        <label class="rk-form-label">Confirm Password</label>
        <input type="password" id="confirmPassword" class="rk-form-control" placeholder="Confirm new password">
      </div>
      <div id="resetError" class="text-danger mb-3" style="display: none; font-size: 14px;"></div>
      <button class="rk-btn rk-btn-primary w-100 mb-3" onclick="submitReset()">Reset Password</button>
    </div>
    
    <div id="resetSuccess" class="text-center" style="display: none;">
      <div class="text-success mb-3"><i class="bi bi-check-circle-fill" style="font-size: 48px;"></i></div>
      <h5 style="color: var(--rk-text);">Password Reset Successful!</h5>
      <p style="color: var(--rk-text-muted);">You can now login with your new password.</p>
      <a href="/login" class="rk-btn rk-btn-primary mt-3 d-inline-block">Go to Login</a>
    </div>
  </div>

  <script>
    async function submitReset() {
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');
      
      const pwd = document.getElementById('newPassword').value;
      const confirm = document.getElementById('confirmPassword').value;
      const errorEl = document.getElementById('resetError');
      
      if (!token) {
        errorEl.textContent = "Error: No reset token provided in URL.";
        errorEl.style.display = "block";
        return;
      }
      
      if (pwd !== confirm) {
        errorEl.textContent = "Passwords do not match!";
        errorEl.style.display = "block";
        return;
      }
      
      if (pwd.length < 6) {
        errorEl.textContent = "Password must be at least 6 characters.";
        errorEl.style.display = "block";
        return;
      }
      
      try {
        const res = await fetch(`/api/auth/reset-password?token=${encodeURIComponent(token)}&new_password=${encodeURIComponent(pwd)}`, {
          method: 'POST'
        });
        
        if (res.ok) {
          document.getElementById('resetForm').style.display = 'none';
          document.getElementById('resetSuccess').style.display = 'block';
        } else {
          const data = await res.json();
          errorEl.textContent = data.detail || "An error occurred during reset.";
          errorEl.style.display = "block";
        }
      } catch (e) {
        errorEl.textContent = "Network error. Please try again.";
        errorEl.style.display = "block";
      }
    }
  </script>
</body>
</html>
