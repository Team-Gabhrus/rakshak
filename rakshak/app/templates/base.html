<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Rakshak — Quantum-Proof Systems Scanner{% endblock %}</title>
    <meta name="description" content="Rakshak: Quantum-proof cryptographic scanner for PNB public-facing applications">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    {% block extra_css %}{% endblock %}

    

    

    <script>
        const theme = localStorage.getItem('rk-theme') || 'light';
        document.documentElement.setAttribute('data-theme', theme);
    </script>
</head>



<body class="rk-body">

<div class="rk-layout">
    <!-- Sidebar -->
    <aside class="rk-sidebar" id="sidebar">
        <div class="rk-sidebar-brand">
            <div class="rk-logo">
                <i class="bi bi-shield-lock-fill"></i>
            </div>
            <div class="rk-brand-text">
                <span class="rk-brand-name">Rakshak</span>
                <span class="rk-brand-sub">Quantum Scanner</span>
            </div>
        </div>

        <nav class="rk-nav">
            <a href="/home" class="rk-nav-item {% if active_page == 'home' %}active{% endif %}" id="nav-home">
                <i class="bi bi-house-door-fill"></i>
                <span>Home</span>
            </a>
            <a href="/asset-inventory" class="rk-nav-item {% if active_page == 'inventory' %}active{% endif %}" id="nav-inventory">
                <i class="bi bi-archive-fill"></i>
                <span>Asset Inventory</span>
            </a>
            <a href="/asset-discovery" class="rk-nav-item {% if active_page == 'discovery' %}active{% endif %}" id="nav-discovery">
                <i class="bi bi-search"></i>
                <span>Asset Discovery</span>
            </a>
            <a href="/cbom" class="rk-nav-item {% if active_page == 'cbom' %}active{% endif %}" id="nav-cbom">
                <i class="bi bi-file-earmark-code-fill"></i>
                <span>CBOM</span>
            </a>
            <a href="/pqc-posture" class="rk-nav-item {% if active_page == 'pqc' %}active{% endif %}" id="nav-pqc">
                <i class="bi bi-cpu-fill"></i>
                <span>Posture of PQC</span>
            </a>
            <a href="/cyber-rating" class="rk-nav-item {% if active_page == 'rating' %}active{% endif %}" id="nav-rating">
                <i class="bi bi-graph-up-arrow"></i>
                <span>Cyber Rating</span>
            </a>
            <a href="/reporting" class="rk-nav-item {% if active_page == 'reporting' %}active{% endif %}" id="nav-reporting">
                <i class="bi bi-file-earmark-bar-graph-fill"></i>
                <span>Reporting</span>
            </a>
        </nav>

        <div class="rk-sidebar-footer">
            <a href="/user-management" class="rk-nav-item {% if active_page == 'users' %}active{% endif %}" id="nav-users">
                <i class="bi bi-people-fill"></i>
                <span>Users</span>
            </a>
            <a href="#" onclick="logout()" class="rk-nav-item">
                <i class="bi bi-box-arrow-right"></i>
                <span>Logout</span>
            </a>
        </div>
    </aside>

    <!-- Main content area -->
    <div class="rk-main">
        <!-- Top Navigation Bar -->
        <header class="rk-topbar">
            <button class="rk-sidebar-toggle" onclick="toggleSidebar()">
                <i class="bi bi-list"></i>
            </button>

            <!-- Global Search — FR-29 -->
            <div class="rk-search-wrap">
                <i class="bi bi-search rk-search-icon"></i>
                <input type="text" class="rk-search-input" id="globalSearch" placeholder="Search domains, URLs, IPs, IoCs..." autocomplete="off">
                <div class="rk-search-dropdown" id="searchDropdown"></div>
            </div>

            <!-- Time Period Filter — FR-30 -->
            <div class="rk-time-filter d-none d-md-flex">
                <i class="bi bi-calendar3"></i>
                <input type="date" id="filterStart" class="rk-time-input">
                <span>–</span>
                <input type="date" id="filterEnd" class="rk-time-input">
                <button class="rk-btn-filter" onclick="applyTimeFilter()">Apply</button>
            </div>

            
            
            <div class="rk-topbar-right">
                <button class="rk-icon-btn" title="Toggle Theme" onclick="toggleTheme()">
                    <i class="bi bi-moon-stars-fill" id="themeIcon"></i>
                </button>

                
                <div class="rk-user-pill" id="userPill">
                    <div class="rk-avatar"><i class="bi bi-person-fill"></i></div>
                    <div class="rk-user-info">
                        <span class="rk-user-name" id="currentUsername">Admin</span>
                        <span class="rk-user-role" id="currentRole">Admin</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Page Content -->
        <main class="rk-content">
            {% block content %}{% endblock %}
        </main>
    </div>
</div>

<!-- Toast notifications -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="/static/js/app.js"></script>
{% block extra_js %}{% endblock %}

<script>
    function toggleTheme() {
        const doc = document.documentElement;
        const currentTheme = doc.getAttribute('data-theme') || 'dark';
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        doc.setAttribute('data-theme', newTheme);
        localStorage.setItem('rk-theme', newTheme);
        const icon = document.getElementById('themeIcon');
        icon.className = newTheme === 'dark' ? 'bi bi-moon-stars-fill' : 'bi bi-sun-fill';
        // Optional logic to reload charts if needed
        if (typeof Chart !== 'undefined') location.reload(); // simple brute-force to re-render charts accurately
    }
    document.addEventListener("DOMContentLoaded", () => {
        const savedTheme = localStorage.getItem('rk-theme') || 'light';
        const icon = document.getElementById('themeIcon');
        if(icon) icon.className = savedTheme === 'dark' ? 'bi bi-moon-stars-fill' : 'bi bi-sun-fill';
    });
</script>

</body>



</html>
