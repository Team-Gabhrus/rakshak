<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Rakshak — Quantum-Proof Systems Scanner{% endblock %}</title>
    <meta name="description" content="Rakshak: Quantum-proof cryptographic scanner for PNB public-facing applications">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link href="/static/css/style.css" rel="stylesheet">
    {% block extra_css %}{% endblock %}
    <style>
        @keyframes rkBellAttention {
            0%, 100% { transform: translateY(0) scale(1); box-shadow: 0 0 0 rgba(249, 187, 26, 0); background: transparent; }
            50% { transform: translateY(-1px) scale(1.04); box-shadow: 0 0 0 6px rgba(249, 187, 26, 0.08); background: rgba(249, 187, 26, 0.12); }
        }
        .rk-icon-btn.rk-bell-attention {
            animation: rkBellAttention 1.4s ease-in-out infinite;
            border-color: rgba(249, 187, 26, 0.35);
        }
    </style>

    

    

    <script>
        const theme = localStorage.getItem('rk-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', theme);
    </script>
</head>



<body class="rk-body">

<div class="rk-layout">
    <!-- Sidebar -->
    <aside class="rk-sidebar" id="sidebar">
        <div class="rk-sidebar-brand">
            <div class="rk-logo">
                <i class="bi bi-shield-lock-fill" style="color: var(--rk-accent-bg);"></i>
            </div>
            <div class="rk-brand-text">
                <span class="rk-brand-name">Rakshak <sup style="font-size:0.5em; padding:2px 5px; border-radius:6px; background:transparent; color:var(--rk-accent, #A3112E); font-weight:700; letter-spacing:0.5px; vertical-align:super; border:1px solid var(--rk-accent, #A3112E);">v1.1</sup></span>
                <span class="rk-brand-sub">Quantum Scanner</span>
            </div>
        </div>

        <nav class="rk-nav">
            <a href="/home" class="rk-nav-item {% if active_page == 'home' %}active{% endif %}" id="nav-home">
                <i class="bi bi-house-door-fill"></i>
                <span>Home</span>
            </a>
            <a href="/asset-inventory" class="rk-nav-item {% if active_page == 'inventory' %}active{% endif %}" id="nav-inventory">
                <i class="bi bi-archive-fill"></i>
                <span>Asset Inventory</span>
            </a>
            <a href="/asset-discovery" class="rk-nav-item {% if active_page == 'discovery' %}active{% endif %}" id="nav-discovery">
                <i class="bi bi-search"></i>
                <span>Asset Discovery</span>
            </a>
            <a href="/cbom" class="rk-nav-item {% if active_page == 'cbom' %}active{% endif %}" id="nav-cbom">
                <i class="bi bi-file-earmark-code-fill"></i>
                <span>CBOM</span>
            </a>
            <a href="/pqc-posture" class="rk-nav-item {% if active_page == 'pqc' %}active{% endif %}" id="nav-pqc">
                <i class="bi bi-cpu-fill"></i>
                <span>Posture of PQC</span>
            </a>
            <a href="/cyber-rating" class="rk-nav-item {% if active_page == 'rating' %}active{% endif %}" id="nav-rating">
                <i class="bi bi-graph-up-arrow"></i>
                <span>Cyber Rating</span>
            </a>
            <a href="/reporting" class="rk-nav-item {% if active_page == 'reporting' %}active{% endif %}" id="nav-reporting">
                <i class="bi bi-file-earmark-bar-graph-fill"></i>
                <span>Reporting</span>
            </a>
            <a href="/chat" class="rk-nav-item {% if active_page == 'chat' %}active{% endif %}" id="nav-chat">
                <i class="bi bi-chat-dots-fill"></i>
                <span>Chat</span>
            </a>
            <a href="/guide" class="rk-nav-item {% if active_page == 'guide' %}active{% endif %}" id="nav-guide">
                <i class="bi bi-book-half"></i>
                <span>Platform Guide</span>
            </a>
        </nav>

        <div class="rk-sidebar-footer">
            <div class="rk-nav-item" style="cursor:default;opacity:0.75">
                <i class="bi bi-shield-check"></i>
                <span>Secure Workspace</span>
            </div>
        </div>
    </aside>

    <!-- Main content area -->
    <div class="rk-main">
        <!-- Top Navigation Bar -->
        <header class="rk-topbar">
            <button class="rk-sidebar-toggle" onclick="toggleSidebar()">
                <i class="bi bi-list"></i>
            </button>

            <!-- Global Search — FR-29 -->
            <div class="rk-search-wrap">
                <i class="bi bi-search rk-search-icon"></i>
                <input type="text" class="rk-search-input" id="globalSearch" placeholder="Search domains, URLs, IPs, IoCs..." autocomplete="off">
                <div class="rk-search-dropdown" id="searchDropdown"></div>
            </div>

            <!-- Time Period Filter — FR-30 -->
            <!-- <div class="rk-time-filter d-none d-md-flex">
                <i class="bi bi-calendar3"></i>
                <input type="date" id="filterStart" class="rk-time-input">
                <span>–</span>
                <input type="date" id="filterEnd" class="rk-time-input">
                <button class="rk-btn-filter" onclick="applyTimeFilter()">Apply</button>
            </div> -->

            
            
            <div class="rk-topbar-right">
                <button class="rk-icon-btn" id="taskBellButton" title="Running Tasks" onclick="openTaskStatusModal()">
                    <i class="bi bi-bell-fill"></i>
                    <span class="rk-badge" id="taskBellBadge" style="display:none;min-width:18px;height:18px;padding:0 5px;border-radius:999px;font-size:10px;line-height:18px;text-align:center"></span>
                </button>
                <button class="rk-icon-btn" title="Toggle Theme" onclick="toggleTheme()">
                    <i class="bi bi-moon-stars-fill" id="themeIcon"></i>
                </button>

                
                <button class="rk-user-pill" id="userPill" type="button" onclick="openProfileModal()" style="background:none;border:none">
                    <div class="rk-avatar"><i class="bi bi-person-fill"></i></div>
                    <div class="rk-user-info">
                        <span class="rk-user-name" id="currentUsername">Admin</span>
                        <span class="rk-user-role" id="currentRole">Admin</span>
                    </div>
                </button>
            </div>
        </header>

        <!-- Page Content -->
        <main class="rk-content">
            {% block content %}{% endblock %}
        </main>
    </div>
</div>

<!-- Toast notifications -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

<div class="modal fade" id="profileModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="background:var(--rk-surface);border:1px solid var(--rk-border)">
            <div class="modal-header" style="border-color:var(--rk-border)">
                <h5 class="modal-title" style="color:var(--rk-text)">Profile Actions</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="d-flex align-items-center gap-3 mb-3">
                    <div class="rk-avatar" style="width:44px;height:44px"><i class="bi bi-person-fill"></i></div>
                    <div>
                        <div class="fw-semibold" style="color:var(--rk-text)" id="profileModalUsername">Admin</div>
                        <div class="fs-13" style="color:var(--rk-text-muted)" id="profileModalRole">Admin</div>
                    </div>
                </div>
                <div class="d-grid gap-2">
                    <button class="rk-btn rk-btn-outline admin-only" id="profileUsersBtn" onclick="goToUsersFromProfile()">
                        <i class="bi bi-people-fill"></i> Users
                    </button>
                    <button class="rk-btn" style="background:rgba(220,53,69,0.12);color:#dc3545;border:1px solid rgba(220,53,69,0.35)" onclick="logout()">
                        <i class="bi bi-box-arrow-right"></i> Logout
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="/static/js/app.js"></script>
{% block extra_js %}{% endblock %}

<script>
(function () {
    // ── Icon update helper ───────────────────────────────────────────────────
    function syncThemeIcon(theme) {
        const icon = document.getElementById('themeIcon');
        if (!icon) return;
        icon.className = theme === 'dark' ? 'bi bi-moon-stars-fill' : 'bi bi-sun-fill';
    }

    // ── Sync icon once DOM ready ────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
        syncThemeIcon(localStorage.getItem('rk-theme') || 'dark');
    });

    // ── Toggle ───────────────────────────────────────────────────────────────
    window.toggleTheme = function () {
        const doc   = document.documentElement;
        const cur   = doc.getAttribute('data-theme') || 'dark';
        const next  = cur === 'dark' ? 'light' : 'dark';

        // Spin the button icon
        const btn = document.getElementById('themeIcon');
        if (btn) {
            btn.classList.add('rk-theme-spin');
            btn.addEventListener('animationend', () => btn.classList.remove('rk-theme-spin'), { once: true });
        }

        // Smooth cross-fade: briefly overlay page with a translucent wash
        const wash = document.createElement('div');
        wash.style.cssText = 'position:fixed;inset:0;background:var(--rk-bg);opacity:0;pointer-events:none;z-index:9999;transition:opacity 180ms ease';
        document.body.appendChild(wash);
        requestAnimationFrame(() => { wash.style.opacity = '0.55'; });

        setTimeout(() => {
            doc.setAttribute('data-theme', next);
            localStorage.setItem('rk-theme', next);
            syncThemeIcon(next);
            wash.style.opacity = '0';
            wash.addEventListener('transitionend', () => wash.remove(), { once: true });

            // Re-render charts without reloading page
            if (typeof Chart !== 'undefined') {
                Object.values(Chart.instances).forEach(c => c.destroy());
            }
            ['loadPageData','loadMetrics','loadAssets','loadDiscoveries',
             'loadCBOMMetrics','loadCBOMList','loadRating','loadHistory',
             'loadPQCPosture','loadReports','loadScans'].forEach(fn => {
                if (typeof window[fn] === 'function') window[fn]();
            });
        }, 140);
    };
})();
</script>
</body>



</html>
