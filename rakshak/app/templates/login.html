<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rakshak — Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link href="/static/css/style.css" rel="stylesheet">
    <style>
    /* Reset base dark mode login background to deep maroon/black gradient */
    .rk-login-bg {
        position: relative; overflow: hidden;
        background: linear-gradient(135deg, #0d0406 0%, #1a0509 100%) !important;
        min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }

    /* Animated Ambient Background Orbs */
    .rk-login-bg::before, .rk-login-bg::after {
        content: ''; position: absolute; border-radius: 50%;
        filter: blur(80px); opacity: 0.4; z-index: 0;
    }
    .rk-login-bg::before {
        width: 450px; height: 450px;
        background: radial-gradient(circle, #A3112E 0%, transparent 70%);
        top: -10%; left: -10%;
        animation: floatOrb1 20s infinite ease-in-out;
    }
    .rk-login-bg::after {
        width: 350px; height: 350px;
        background: radial-gradient(circle, #f9bb1a 0%, transparent 70%);
        bottom: -10%; right: -10%;
        animation: floatOrb2 25s infinite ease-in-out;
    }

    @keyframes floatOrb1 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        33% { transform: translate(15vw, 15vh) scale(1.2); }
        66% { transform: translate(-10vw, 25vh) scale(0.9); }
    }
    @keyframes floatOrb2 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        33% { transform: translate(-20vw, -15vh) scale(1.15); }
        66% { transform: translate(10vw, -20vh) scale(0.85); }
    }

    /* Glassmorphic Login Panel */
    .rk-login-card {
        position: relative; z-index: 1;
        background: rgba(26, 5, 9, 0.4) !important;
        backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(249, 187, 26, 0.15) !important;
        box-shadow: 0 24px 64px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06) !important;
        border-radius: 20px !important;
    }

    /* Typography & Icons Overrides */
    .rk-login-card h1 { color: #ffffff !important; letter-spacing: -0.5px; }
    .rk-login-card p.text-muted { color: rgba(255,255,255,0.5) !important; }
    .rk-login-card .rk-form-label { color: rgba(255,255,255,0.85); font-weight: 500; }
    .rk-login-card .bi { color: rgba(255,255,255,0.4) !important; }
    
    /* Input Form Styling */
    .rk-login-card .rk-form-control {
        background: rgba(255,255,255,0.04) !important;
        border: 1px solid rgba(255,255,255,0.08) !important;
        color: #ffffff !important; transition: all 0.3s ease;
    }
    .rk-login-card .rk-form-control:focus {
        background: rgba(255,255,255,0.08) !important;
        border-color: #f9bb1a !important;
        box-shadow: 0 0 0 4px rgba(249, 187, 26, 0.15) !important;
    }
    .rk-login-card .rk-form-control::placeholder { color: rgba(255,255,255,0.2) !important; }

    /* Primary PNB Theme Button */
    .btn-login-accent {
        background: linear-gradient(135deg, #A3112E, #d29922);
        border: none; color: #ffffff !important; font-weight: 600; letter-spacing: 0.5px;
        transition: all 0.3s ease; box-shadow: 0 8px 20px rgba(163, 17, 46, 0.3);
    }
    .btn-login-accent:hover {
        background: linear-gradient(135deg, #b81735, #f9bb1a);
        box-shadow: 0 10px 25px rgba(249, 187, 26, 0.4); transform: translateY(-2px);
    }
    .btn-login-accent:active { transform: translateY(1px); box-shadow: 0 4px 10px rgba(163, 17, 46, 0.4); }
    
    /* Checkbox styling */
    .rk-login-card .form-check-input {
        background-color: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2);
    }
    .rk-login-card .form-check-input:checked {
        background-color: #A3112E; border-color: #A3112E;
    }
    </style>
</head>
<body class="rk-body rk-login-bg">
<div class="rk-login-card rk-fade-in">
    <div class="text-center mb-4">
        <div class="mx-auto mb-3 d-flex align-items-center justify-content-center" style="width:64px;height:64px;background:rgba(255,255,255,0.05);border-radius:16px;border:1px solid rgba(255,255,255,0.05);box-shadow:inset 0 1px 0 rgba(255,255,255,0.1);">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="32" height="32" style="filter: drop-shadow(0 0 12px rgba(249,187,26,0.4));">
              <path fill="#f9bb1a" d="M5.072.56C6.157.265 7.31 0 8 0s1.843.265 2.928.56c1.11.3 2.229.655 2.887.87a1.54 1.54 0 0 1 1.044 1.262c.596 4.477-.787 7.795-2.465 9.99a11.775 11.775 0 0 1-2.517 2.453 7.159 7.159 0 0 1-1.048.625c-.28.132-.581.24-.829.24s-.548-.108-.829-.24a7.158 7.158 0 0 1-1.048-.625 11.777 11.777 0 0 1-2.517-2.453C1.928 10.463.545 7.145 1.141 2.692A1.54 1.54 0 0 1 2.185 1.43 62.456 62.456 0 0 1 5.072.56z"/>
              <g transform="translate(4.5, 4.5) scale(0.44)">
                <path fill="#A3112E" d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2zm3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/>
              </g>
            </svg>
        </div>
        <h1 style="font-size:22px;font-weight:800;color:var(--rk-text)">Rakshak</h1>
        <p class="text-muted mb-0" style="font-size:13px;">Quantum-Proof Systems Scanner</p>
        <p class="text-muted" style="font-size:11px;opacity:0.6">Punjab National Bank — PSB Hackathon 2026</p>
    </div>

    <div id="loginError" class="alert alert-danger py-2 fs-12 d-none" role="alert"></div>

    <form id="loginForm">
        <div class="mb-3">
            <label class="rk-form-label" for="username">Email or Username</label>
            <div style="position:relative">
                <i class="bi bi-person" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--rk-text-muted)"></i>
                <input type="text" class="rk-form-control" id="username" style="padding-left:38px" placeholder="admin or admin@rakshak.pnb.in" required autocomplete="username">
            </div>
        </div>
        <div class="mb-3">
            <label class="rk-form-label" for="password">Password</label>
            <div style="position:relative">
                <i class="bi bi-lock" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--rk-text-muted)"></i>
                <input type="password" class="rk-form-control" id="password" style="padding-left:38px;padding-right:38px" placeholder="••••••••" required autocomplete="current-password">
                <button type="button" onclick="togglePwd()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--rk-text-muted);cursor:pointer;font-size:16px" id="pwdToggle">
                    <i class="bi bi-eye" id="pwdIcon"></i>
                </button>
            </div>
        </div>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <label class="d-flex align-items-center gap-2 fs-12 text-muted" style="cursor:pointer">
                <input type="checkbox" class="form-check-input m-0"> Remember me
            </label>
            <a href="#" onclick="showForgot()" style="font-size:13px;color:#f9bb1a;text-decoration:none;font-weight:500;transition:opacity 0.2s;" onmouseover="this.style.opacity=0.8" onmouseout="this.style.opacity=1">Forgot Password?</a>
        </div>
        <button type="submit" class="rk-btn btn-login-accent w-100 justify-content-center py-2" id="loginBtn">
            <i class="bi bi-box-arrow-in-right" style="color:#fff !important; margin-right:6px"></i> Sign In
        </button>
    </form>

    <div id="forgotForm" class="d-none mt-3">
        <hr style="border-color:var(--rk-border)">
        <p class="fs-13 text-muted mb-2">Enter your email to receive a reset link.</p>
        <div class="mb-2">
            <input type="email" class="rk-form-control" id="forgotEmail" placeholder="your-email@pnb.in">
        </div>
        <button onclick="submitForgot()" class="rk-btn rk-btn-outline w-100 justify-content-center py-2 bg-transparent text-white" style="border-color:rgba(255,255,255,0.2)">
            <i class="bi bi-envelope" style="color:#fff !important; margin-right:6px"></i> Send Reset Link
        </button>
        <p class="text-center mt-2"><a href="#" onclick="showLogin()" style="font-size:12px;color:var(--rk-text-muted)">Back to login</a></p>
    </div>

    <!-- OTP Form for 2FA -->
    <div id="otpForm" class="d-none mt-3">
        <hr style="border-color:var(--rk-border); margin-bottom: 24px;">
        <div class="text-center mb-3">
            <i class="bi bi-shield-lock" style="font-size: 32px; color: #f9bb1a; opacity: 0.8;"></i>
        </div>
        <p class="fs-13 text-muted mb-3 text-center" id="otpHelpText">Enter the 6-digit OTP sent to your email.</p>
        <div class="mb-4">
            <div style="position:relative">
                <input type="text" class="rk-form-control text-center" id="otpCode" onkeydown="if(event.key === 'Enter') { event.preventDefault(); submitOtp(); }" style="font-size: 1.5rem; letter-spacing: 0.5em; font-weight: bold; background: rgba(255,255,255,0.08) !important;" placeholder="------" required autocomplete="one-time-code" maxlength="6" pattern="\d{6}">
            </div>
        </div>
        <button onclick="submitOtp()" type="button" class="rk-btn btn-login-accent w-100 justify-content-center py-2" id="otpBtn">
            Verify & Sign In <i class="bi bi-arrow-right" style="color:#fff !important; margin-left:6px"></i>
        </button>
        <p class="text-center mt-3 mb-0"><a href="#" onclick="showLogin()" style="font-size:12px;color:var(--rk-text-muted); transition: color 0.2s;">&larr; Cancel</a></p>
    </div>

    <p class="text-center mt-4 mb-0" style="font-size:11px;color:rgba(255,255,255,0.3)">
        Default: <code style="color:#d29922;background:none;padding:0">admin / admin@123</code> &nbsp;|&nbsp; <code style="color:#f9bb1a;background:none;padding:0">checker / checker@123</code>
    </p>
</div>

<script>
let currentUsername = "";

document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Signing in...';
    btn.disabled = true;

    currentUsername = document.getElementById('username').value;
    
    try {
        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                username: currentUsername,
                password: document.getElementById('password').value,
            })
        });
        const data = await res.json();
        
        if (res.ok) {
            if (data.require_otp) {
                // Show OTP form instead of login 
                document.getElementById('loginForm').classList.add('d-none');
                document.getElementById('forgotForm').classList.add('d-none');
                document.getElementById('otpForm').classList.remove('d-none');
                document.getElementById('otpHelpText').innerHTML = `Enter the 6-digit OTP sent to your email. Expires in 5 minutes.`;
                document.getElementById('loginError').classList.add('d-none');
                btn.innerHTML = '<i class="bi bi-box-arrow-in-right" style="color:#fff !important; margin-right:6px"></i> Sign In';
                btn.disabled = false;
                document.getElementById('otpCode').focus();
            } else {
                // Fallback (if OTP disabled)
                localStorage.setItem('token', data.access_token);
                localStorage.setItem('username', data.username);
                localStorage.setItem('role', data.role);
                document.cookie = `access_token=${data.access_token}; path=/; max-age=1800`;
                window.location.href = '/home';
            }
        } else {
            const errEl = document.getElementById('loginError');
            errEl.textContent = data.detail || 'Invalid email or password';
            errEl.classList.remove('d-none');
            btn.innerHTML = '<i class="bi bi-box-arrow-in-right" style="color:#fff !important; margin-right:6px"></i> Sign In';
            btn.disabled = false;
        }
    } catch(err) {
        document.getElementById('loginError').textContent = "Network error. Try again.";
        document.getElementById('loginError').classList.remove('d-none');
        btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Sign In';
        btn.disabled = false;
    }
});

async function submitOtp() {
    const btn = document.getElementById('otpBtn');
    const otpCode = document.getElementById('otpCode').value.trim();
    if (otpCode.length !== 6) {
        document.getElementById('loginError').textContent = 'Please enter a valid 6-digit OTP';
        document.getElementById('loginError').classList.remove('d-none');
        return;
    }
    
    document.getElementById('loginError').classList.add('d-none');
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Verifying...';
    btn.disabled = true;

    try {
        const res = await fetch('/api/auth/verify-otp', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                username: currentUsername,
                otp: otpCode,
            })
        });
        const data = await res.json();
        
        if (res.ok) {
            localStorage.setItem('token', data.access_token);
            localStorage.setItem('username', data.username);
            localStorage.setItem('role', data.role);
            document.cookie = `access_token=${data.access_token}; path=/; max-age=1800`;
            window.location.href = '/home';
        } else {
            const errEl = document.getElementById('loginError');
            errEl.textContent = data.detail || 'Invalid OTP code';
            errEl.classList.remove('d-none');
            btn.innerHTML = 'Verify & Sign In <i class="bi bi-arrow-right" style="color:#fff !important; margin-left:6px"></i>';
            btn.disabled = false;
            document.getElementById('otpCode').value = '';
        }
    } catch(err) {
        document.getElementById('loginError').textContent = "Network error verifying OTP.";
        document.getElementById('loginError').classList.remove('d-none');
        btn.innerHTML = 'Verify & Sign In <i class="bi bi-arrow-right" style="color:#fff !important; margin-left:6px"></i>';
        btn.disabled = false;
    }
}

function togglePwd() {
    const pwd = document.getElementById('password');
    const icon = document.getElementById('pwdIcon');
    if (pwd.type === 'password') { pwd.type = 'text'; icon.className = 'bi bi-eye-slash'; }
    else { pwd.type = 'password'; icon.className = 'bi bi-eye'; }
}
function showForgot() {
    document.getElementById('loginForm').classList.add('d-none');
    document.getElementById('otpForm').classList.add('d-none');
    document.getElementById('forgotForm').classList.remove('d-none');
    document.getElementById('loginError').classList.add('d-none');
}

function showLogin() {
    document.getElementById('forgotForm').classList.add('d-none');
    document.getElementById('otpForm').classList.add('d-none');
    document.getElementById('loginForm').classList.remove('d-none');
    document.getElementById('loginError').classList.add('d-none');
    const otpCodeEl = document.getElementById('otpCode');
    if (otpCodeEl) otpCodeEl.value = '';
}
async function submitForgot() {
    const email = document.getElementById('forgotEmail').value;
    const res = await fetch('/api/auth/forgot-password', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({email})
    });
    const data = await res.json().catch(() => ({}));

    if (res.ok) {
        document.getElementById('loginError').textContent = data.message || 'Password reset link sent.';
        document.getElementById('loginError').className = 'alert alert-success py-2 fs-12';
        document.getElementById('loginError').classList.remove('d-none');
        showLogin();
        return;
    }

    document.getElementById('loginError').textContent = data.detail || 'User does not exist.';
    document.getElementById('loginError').className = 'alert alert-danger py-2 fs-12';
    document.getElementById('loginError').classList.remove('d-none');
}
</script>
</body>
</html>
